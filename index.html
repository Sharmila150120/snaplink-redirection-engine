<!DOCTYPE html>
<html>
<head>
    <title>SnapLink ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-black text-indigo-500 mb-2 italic">SNAPLINK ⚡</h1>
        <p class="text-slate-500 text-sm mb-8">Fast, secure URL redirection engine.</p>

        <form method="POST" class="space-y-4">
            <input type="url" name="url" placeholder="Paste a long URL here..." required
                   class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl outline-none focus:border-indigo-500 transition">
            <button class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-bold transition transform active:scale-95">
                Shorten Link
            </button>
        </form>

        {% if short_url %}
        <div class="mt-8 p-4 bg-indigo-950/30 border-2 border-dashed border-indigo-500/50 rounded-xl text-center">
            <p class="text-xs text-indigo-400 uppercase font-bold mb-2 tracking-widest">Your SnapLink:</p>
            <a href="{{ short_url }}" target="_blank" class="text-xl font-mono text-white underline">{{ short_url }}</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
